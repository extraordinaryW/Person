<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PNG 预览</title>
    <style>
        html, body {
            margin: 0;
            height: 100%;
        }
        .image-wrap {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f5f5;
        }
        .image-viewer {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <section class="image-wrap">
        <img class="image-viewer" src="proof.png" alt="PNG 预览" />
    </section>
</body>
</html>
