<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF 预览</title>
    <style>
        html, body {
            margin: 0;
            height: 100%;
        }
        .pdf-wrap {
            height: 100%;
        }
        .pdf-viewer {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
        }
    </style>
</head>
<body>
    <section class="pdf-wrap">
        <object class="pdf-viewer" data="proof.pdf" type="application/pdf">
            <iframe class="pdf-viewer" src="proof.pdf" title="PDF 预览"></iframe>
        </object>
    </section>
</body>
</html>
